<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-1 w-full p-2" method="post">
  <div class="text-left relative group max-md:flex flex-col md:grid md:grid-cols-4 md:items-center mt-2">
    <label class="font-medium text-gray-700 mb-2" for="name">
      Your name <span class="text-red-500">*</span>
    </label>
    <app-input [control]="form.controls.name" inputId="name" name="name" type="text" placeholder="John Doe" />
  </div>
  <div class="text-left relative group max-md:flex flex-col md:grid md:grid-cols-4 md:items-center mt-2">
    <label class="font-medium text-gray-700 mb-2" for="email">
      Your email <span class="text-red-500">*</span>
    </label>
    <app-input [control]="form.controls.email" inputId="email" name="email" type="email"
      placeholder="you@university.edu" />
  </div>
  <div class="text-left relative group max-md:flex flex-col md:grid md:grid-cols-4 md:items-center mt-2">
    <label class="font-medium text-gray-700 mb-2" for="confirm-email">
      Retype email <span class="text-red-500">*</span>
    </label>
    <app-input [control]="form.controls.confirmEmail" inputId="confirm-email" name="confirm-email" type="email"
      placeholder="you@university.edu" />
  </div>
  <div class="text-left relative group max-md:flex flex-col md:grid md:grid-cols-4 md:items-center mt-2">
    <label class="font-medium text-gray-700 mb-2" for="subject">
      Subject <span class="text-red-500">*</span>
    </label>
    <app-input [control]="form.controls.subject" inputId="subject" name="subject" type="text"
      placeholder="Subject of your message" />
  </div>
  <div class="text-left relative group max-md:flex flex-col md:grid md:grid-cols-4 mt-2">

    <label class="font-medium text-gray-700 mb-2" for="message">
      Message <span class="text-red-500">*</span>
    </label>
    <textarea
      formControlName="message"
      class="col-span-3 border-2 border-gray-200 px-4 py-3 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all duration-200 outline-none resize-none bg-white hover:border-gray-300"
      id="message"
      name="message"
      placeholder="Share us your question or feedback"
      rows="5">
    </textarea>
  </div>


@if (sending()) {
  <div id="turnstile-container" class="my-6 flex justify-left min-h-[70px]"></div>
}

<button
  class="header-btn self-center disabled:opacity-50 disabled:cursor-not-allowed"
  [disabled]="sending() || form.invalid"
  type="submit">
  <span data-submit-label>
    {{ sending() ? 'Verifying...' : 'Send Message' }}
  </span>
  <svg class="w-4 h-4" data-mail-icon fill="currentColor" viewBox="0 0 24 24">
    <path
      d="M2.3 11.3l18.6-9.3a1 1 0 0 1 1.4 1.4l-9.3 18.6a1 1 0 0 1-1.9-.2l-1.1-6.1-6.1-1.1a1 1 0 0 1-.2-1.9zm7.9 2.7l1 5.4 6.7-13.4-13.4 6.7 5.4 1a1 1 0 0 1 .3.2z">
    </path>
  </svg>
</button>

@if (status() === 'sent') {
  <p class="mx-auto mt-6 max-w-md rounded-lg border border-green-200 bg-green-50 px-6 py-4 text-center text-green-800">
    Thank you for your submission. We will get back to you as soon as possible.
  </p>
}

@if (status() === 'error') {
  <p class="mx-auto mt-6 max-w-md rounded-lg border border-red-200 bg-red-50 px-6 py-4 text-center text-red-800">
    {{ errorMessage() }}
  </p>
}
</form>

<div>{{ form.errors?.["EmailNoMatch"]}}</div>
